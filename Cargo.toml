[package]
name = "strata"
version = "0.2.0"
edition = "2021"
description = "Strata â€” a local, Athena-style parquet query workspace (Dioxus + DataFusion)."
license = "MIT"

[features]
default = ["sample-data"]
# Dev convenience: on first launch (no recent project), open the bundled on-disk
# sample project shipped in the repo `sample/` dir. Disable
# (`--no-default-features`) for a clean production start that reopens the
# most-recent project or shows the launcher.
sample-data = []

[dependencies]
# UI: Dioxus desktop (RSX in a webview, so the Strata CSS ports faithfully)
dioxus = { version = "0.7", features = ["desktop"] }

# Syntax highlighter for the SQL query view (tree-sitter based). We vendor the
# editor *component* into src/ui/code_editor (S26a) to add caret/keydown/decoration
# support the upstream `dioxus-code-editor` crate doesn't expose; the highlighter
# (`dioxus-code`) is still an upstream dep. Grammars are per-language features.
dioxus-code = { version = "0.1", features = ["runtime", "lang-sql", "lang-json"] }

# Reactive stores (per-entry reactivity + field lenses) â€” the tab model is a
# Store<Session>, so each tab view binds a sub-store scoped to its own tab.
dioxus-stores = "0.7"

# OS-level global hotkeys for the app's global commands (âŒ˜F/âŒ˜K/â€¦). Already a
# transitive dep of dioxus-desktop; pinned to the same 0.7 so the `GlobalHotKeyEvent`
# it wraps in `UserWindowEvent` unifies with the one we register/read (crate::hotkeys).
global-hotkey = "0.7"

# Query engine: Apache DataFusion (Arrow-native SQL over parquet)
# A9: 43 â†’ 54. datafusion is our only DataFusion-family pin (arrow/parquet/
# sqlparser/object_store come through its re-exports). See docs/A9_DATAFUSION_UPGRADE.md.
datafusion = "54"

# Async runtime + stream utilities for the engine thread
tokio = { version = "1", features = ["full"] }
futures = "0.3"

# SQL formatting for the editor "Format" action
sqlformat = "0.3"

# Serde for project (.psproj) + app-config persistence
serde = { version = "1", features = ["derive"] }
# `preserve_order` keeps object keys in insertion order so pretty-printed JSON copies
# (crate::serialize::PrettyJsonWriter) reflect arrow's column / struct-field order instead of
# alphabetizing (indexmap is already in the tree via arrow-json). `arbitrary_precision` keeps
# Decimal128/256 exact â€” arrow emits them as raw number tokens; without it serde_json would parse
# them through f64 and reformat high-precision decimals.
serde_json = { version = "1", features = ["preserve_order", "arbitrary_precision"] }

# Global config (recent projects + prefs) â†’ JSON in the OS user-config dir.
# serde-based, no Dioxus coupling.
preferences = "2"

# Native file/folder dialogs
rfd = "0.15"

# System clipboard (Copy result as markdown)
arboard = "3"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# macOS: set the NSWindow background dark so window resizes don't flash white
# (the webview repaints a beat behind the frame). objc is already in the tree
# via dioxus-desktop; declared here so we can call into AppKit directly.
[target.'cfg(target_os = "macos")'.dependencies]
objc = "0.2"
# ObjC completion-handler block for NSOpenPanel (combined file/folder picker).
block = "0.1"

[profile.dev]
opt-level = 1

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
